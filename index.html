<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>爆速レシートおばちゃん（未来永劫版）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .scan-frame { position: absolute; width: 16rem; height: 20rem; border: 4px solid transparent; animation: blink 1.5s infinite; }
        .scan-frame::before, .scan-frame::after { content: ''; position: absolute; width: 40px; height: 40px; border-color: #4ade80; border-style: solid; }
        .scan-frame::before { top: -4px; left: -4px; border-width: 4px 0 0 4px; }
        .scan-frame::after { bottom: -4px; right: -4px; border-width: 0 4px 4px 0; }
        .scan-frame-inner::before, .scan-frame-inner::after { content: ''; position: absolute; width: 40px; height: 40px; border-color: #4ade80; border-style: solid; }
        .scan-frame-inner::before { top: -4px; right: -4px; border-width: 4px 4px 0 0; }
        .scan-frame-inner::after { bottom: -4px; left: -4px; border-width: 0 0 4px 4px; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .flash { animation: flashBg 0.5s; }
        @keyframes flashBg { 0% { background-color: white; } 100% { background-color: black; } }
        .fade-in { animation: fadeIn 0.5s; }
        @keyframes fadeIn { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-900 text-white overflow-hidden font-sans">

    <script>
        const GEMINI_API_KEY = "ここに取得したAPIキーを貼り付け"; 
        
        // 【総監督仕様】未来のモデルまで含めた優先リスト
        // 上にあるものほど「最新かつ優先」して使われます
        const MODEL_PRIORITY = [
            "gemini-2.0-flash-exp",   // 将来の2.0テスト版
            "gemini-1.5-flash-latest", // 現在の最新
            "gemini-1.5-flash"        // 安定版
        ];
        let currentModelIndex = 0;
    </script>

    <div class="fixed top-0 left-0 right-0 p-4 z-30 bg-gradient-to-b from-black/70 to-transparent flex items-start gap-2">
        <div class="text-4xl">👵</div>
        <div class="bg-white p-2 rounded-lg rounded-tl-none relative shadow-lg max-w-[220px] text-gray-800">
            <p id="msg" class="text-xs font-bold leading-relaxed">最新の知能で見てるよ！<br>レシートを枠に合わせな！</p>
        </div>
    </div>

    <div id="camera-container" class="w-full h-screen flex items-center justify-center relative bg-black">
        <div id="camera-placeholder" class="text-gray-600 text-xs">カメラを呼び出しているよ...</div>
        <div class="scan-frame z-20 pointer-events-none">
            <div class="scan-frame-inner relative w-full h-full"></div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 p-4 z-30 bg-gradient-to-t from-black/90 to-transparent">
        <div id="history-list" class="flex gap-2 overflow-x-auto pb-4 mb-2 no-scrollbar min-h-[80px]">
            <div id="history-empty" class="min-w-[80px] h-20 bg-gray-800/50 rounded border border-gray-600 flex items-center justify-center text-[10px] text-gray-500 font-bold uppercase tracking-tighter italic">No History</div>
        </div>
        <div class="flex justify-between items-center px-1">
            <div id="status" class="text-[10px] text-green-400 font-mono tracking-widest font-bold">SYSTEM ACTIVE</div>
            <div id="active-model" class="text-[8px] text-gray-500 font-bold uppercase opacity-50">Checking Model...</div>
        </div>
    </div>

    <canvas id="shutter-canvas" class="hidden"></canvas>

    <script>
        let scanCount = 0;
        let isProcessing = false;

        async function startCamera() {
            const container = document.getElementById('camera-placeholder');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 } }, 
                    audio: false 
                });
                const videoElement = document.createElement('video');
                videoElement.id = 'camera-video';
                videoElement.srcObject = stream;
                videoElement.setAttribute('playsinline', ''); 
                videoElement.play();
                videoElement.className = "w-full h-full object-cover";
                container.innerHTML = "";
                container.appendChild(videoElement);
                
                runLoop();
            } catch (err) {
                document.getElementById('msg').innerText = "カメラの許可が必要だよ。";
            }
        }

        async function runLoop() {
            while (true) {
                await aiScanStep();
                // 待機時間を3秒にして安定化
                await new Promise(r => setTimeout(r, 3000));
            }
        }

        async function aiScanStep() {
            if (isProcessing || !GEMINI_API_KEY || GEMINI_API_KEY.includes("貼り付け")) return;
            
            const video = document.getElementById('camera-video');
            const canvas = document.getElementById('shutter-canvas');
            if (!video || !video.videoWidth) return;

            isProcessing = true;
            document.getElementById('status').innerText = "AI LOOKING...";

            const context = canvas.getContext('2d');
            canvas.width = 400; // AIが認識しやすいサイズに固定
            canvas.height = 500;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            const base64Image = canvas.toDataURL('image/jpeg', 0.5).split(',')[1];

            // 優先リストに従ってリトライ
            for (let i = currentModelIndex; i < MODEL_PRIORITY.length; i++) {
                const model = MODEL_PRIORITY[i];
                document.getElementById('active-model').innerText = model;

                try {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${GEMINI_API_KEY}`;
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: "Output 'YES' if a receipt is clearly centered and readable. Otherwise 'NO'. No chat." },
                                    { inline_data: { mime_type: "image/jpeg", data: base64Image } }
                                ]
                            }],
                            generationConfig: { temperature: 0 }
                        })
                    });

                    const data = await response.json();

                    if (data.error) {
                        // 次のモデルを試す
                        console.warn(`${model} failed, trying next...`);
                        continue; 
                    }

                    // 成功したら、次からはこのモデルを優先的に使う
                    currentModelIndex = i;
                    const result = data.candidates[0].content.parts[0].text.trim().toUpperCase();

                    if (result.includes("YES")) {
                        executeCapture(video);
                    } else {
                        document.getElementById('status').innerText = "IDLE";
                    }
                    break; // 成功したのでループを抜ける
                } catch (e) {
                    console.error("Fetch Error:", e);
                }
            }
            isProcessing = false;
        }

        function executeCapture(video) {
            scanCount++;
            const canvas = document.getElementById('shutter-canvas');
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0);
            const imageDataUrl = canvas.toDataURL('image/png');

            document.getElementById('camera-container').classList.add('flash');
            setTimeout(() => document.getElementById('camera-container').classList.remove('flash'), 500);
            
            document.getElementById('msg').innerText = `${scanCount}枚目！バッチリだよ、あんた！`;

            const list = document.getElementById('history-list');
            const empty = document.getElementById('history-empty');
            if (empty) empty.remove();
            
            const newCard = document.createElement('div');
            newCard.className = "min-w-[80px] h-20 bg-gray-700 rounded border border-green-500 overflow-hidden fade-in relative shadow-lg";
            newCard.innerHTML = `<img src="${imageDataUrl}" class="w-full h-full object-cover">`;
            list.prepend(newCard);
        }

        window.onload = startCamera;
        document.body.addEventListener('click', () => { if (!document.querySelector('video')) startCamera(); }, { once: true });
    </script>
</body>
</html>
