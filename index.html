<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>爆速レシートおばちゃん（超安定版）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .scan-frame { position: absolute; width: 16rem; height: 20rem; border: 4px solid transparent; animation: blink 1.5s infinite; }
        .scan-frame::before, .scan-frame::after { content: ''; position: absolute; width: 40px; height: 40px; border-color: #4ade80; border-style: solid; }
        .scan-frame::before { top: -4px; left: -4px; border-width: 4px 0 0 4px; }
        .scan-frame::after { bottom: -4px; right: -4px; border-width: 0 4px 4px 0; }
        .scan-frame-inner::before, .scan-frame-inner::after { content: ''; position: absolute; width: 40px; height: 40px; border-color: #4ade80; border-style: solid; }
        .scan-frame-inner::before { top: -4px; right: -4px; border-width: 4px 4px 0 0; }
        .scan-frame-inner::after { bottom: -4px; left: -4px; border-width: 0 0 4px 4px; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        .flash { animation: flashBg 0.5s; }
        @keyframes flashBg { 0% { background-color: white; } 100% { background-color: black; } }
        .fade-in { animation: fadeIn 0.5s; }
        @keyframes fadeIn { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-900 text-white overflow-hidden font-sans">

    <script>
        // 【重要】ここにあなたのAPIキーを貼り付けてください
        const GEMINI_API_KEY = "AIzaSyBhRkqQT_H3E5H6pItF8_145QZjp1WThsc"; 
    </script>

    <div class="fixed top-0 left-0 right-0 p-4 flex justify-between items-start z-30 bg-gradient-to-b from-black/70 to-transparent">
        <div class="flex items-start gap-2 text-gray-800">
            <div class="text-4xl">👵</div>
            <div class="bg-white p-2 rounded-lg rounded-tl-none relative shadow-lg max-w-[200px]">
                <p id="msg" class="text-sm font-bold">おばちゃんがレシートを見てるよ。枠に入れておくれ！</p>
            </div>
        </div>
    </div>

    <div id="camera-container" class="w-full h-screen flex items-center justify-center relative bg-black">
        <div id="camera-placeholder" class="text-gray-600 text-sm">カメラ準備中...</div>
        <div class="scan-frame z-20 pointer-events-none">
            <div class="scan-frame-inner relative w-full h-full"></div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 p-4 z-30 bg-gradient-to-t from-black/90 to-transparent">
        <div id="history-list" class="flex gap-2 overflow-x-auto pb-4 mb-2 no-scrollbar">
            <div id="history-empty" class="min-w-[80px] h-20 bg-gray-700 rounded border border-gray-500 flex items-center justify-center text-xs text-gray-400 font-bold">履歴なし</div>
        </div>
        <div class="flex justify-between items-center px-2">
            <div id="status" class="text-[10px] text-green-400 font-mono uppercase tracking-widest">IDLE</div>
            <div class="text-[10px] text-gray-400 font-bold">AUTO SCAN ACTIVE</div>
        </div>
    </div>

    <canvas id="shutter-canvas" class="hidden"></canvas>

    <script>
        let scanCount = 0;
        let isProcessing = false;

        async function startCamera() {
            const container = document.getElementById('camera-placeholder');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }, 
                    audio: false 
                });
                const videoElement = document.createElement('video');
                videoElement.id = 'camera-video';
                videoElement.srcObject = stream;
                videoElement.setAttribute('playsinline', ''); 
                videoElement.play();
                videoElement.className = "w-full h-full object-cover";
                container.innerHTML = "";
                container.appendChild(videoElement);
                
                // 判定開始
                console.log("Camera started. Loop begins.");
                runLoop();
            } catch (err) {
                document.getElementById('msg').innerText = "カメラが映らないねぇ。ブラウザの設定を見ておくれ。";
            }
        }

        async function runLoop() {
            while (true) {
                await aiScanStep();
                // 判定の間隔を3秒に広げて安定させる
                await new Promise(resolve => setTimeout(resolve, 3000));
            }
        }

        async function aiScanStep() {
            if (isProcessing || !GEMINI_API_KEY || GEMINI_API_KEY.includes("貼り付け")) return;
            
            const video = document.getElementById('camera-video');
            const canvas = document.getElementById('shutter-canvas');
            if (!video || !video.videoWidth) return;

            isProcessing = true;
            document.getElementById('status').innerText = "ANALYZING...";

            const context = canvas.getContext('2d');
            // AIに送る画像は小さくして速度を稼ぐ
            canvas.width = 300;
            canvas.height = 400;
            context.drawImage(video, 0, 0, canvas.width, canvas.height);
            const base64Image = canvas.toDataURL('image/jpeg', 0.6).split(',')[1];

            try {
                // v1betaモデルを使用し、より広いバージョンを網羅するエンドポイント
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
                
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "Is there a receipt clearly visible in the center? Answer 'YES' or 'NO' only." },
                                { inline_data: { mime_type: "image/jpeg", data: base64Image } }
                            ]
                        }],
                        generationConfig: { temperature: 0.1 }
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    throw new Error(data.error.message);
                }

                const result = data.candidates[0].content.parts[0].text.trim().toUpperCase();
                console.log("AI Result:", result);

                if (result.includes("YES")) {
                    executeCapture(video);
                } else {
                    document.getElementById('status').innerText = "IDLE (NO RECEIPT)";
                }
            } catch (err) {
                console.error("AI Error:", err);
                document.getElementById('status').innerText = "ERROR: " + err.message.substring(0, 10);
                document.getElementById('msg').innerText = "おや、AIの調子が悪いみたいだね。";
            } finally {
                isProcessing = false;
            }
        }

        function executeCapture(video) {
            scanCount++;
            const canvas = document.getElementById('shutter-canvas');
            const context = canvas.getContext('2d');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0);
            const imageDataUrl = canvas.toDataURL('image/png');

            document.getElementById('camera-container').classList.add('flash');
            setTimeout(() => document.getElementById('camera-container').classList.remove('flash'), 500);
            
            document.getElementById('msg').innerText = `バッチリ！${scanCount}枚目、預かったよ！`;

            const list = document.getElementById('history-list');
            const empty = document.getElementById('history-empty');
            if (empty) empty.remove();
            
            const newCard = document.createElement('div');
            newCard.className = "min-w-[80px] h-20 bg-gray-700 rounded border border-green-500 overflow-hidden fade-in relative";
            newCard.innerHTML = `
                <img src="${imageDataUrl}" class="w-full h-full object-cover">
                <div class="absolute bottom-0 right-0 bg-green-500 text-white text-[8px] px-1">#${scanCount}</div>
            `;
            list.prepend(newCard);
        }

        window.onload = startCamera;
        document.body.addEventListener('click', () => { if (!document.querySelector('video')) startCamera(); }, { once: true });
    </script>
</body>
</html>
