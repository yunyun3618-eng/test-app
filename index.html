<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>確定申告レシート補助ツール v2.6.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 中央十字照準（点滅＋縁取りで視認性向上） */
        .crosshair {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 44px; height: 44px;
            z-index: 20; pointer-events: none;
        }
        .crosshair-line { 
            position: absolute; 
            background-color: #4ade80; 
            box-shadow: 0 0 0 1px rgba(0,0,0,0.8); /* 黒い縁取りで白飛び対策 */
        }
        .crosshair-h { top: 21px; left: 0; width: 44px; height: 2px; }
        .crosshair-v { top: 0; left: 21px; width: 2px; height: 44px; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        .blinking { animation: blink 1.2s infinite; }

        /* プレビュー：半透明HUD */
        #preview-overlay { position: fixed; inset: 0; z-index: 100; display: none; background: rgba(0,0,0,0.9); }
        #hud-panel {
            position: absolute; bottom: 30px; left: 12px; right: 12px;
            background: rgba(30, 41, 59, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 20px; z-index: 110;
        }

        /* メッセージボックス */
        #msg-box { background: rgba(255, 255, 255, 0.98); color: #111; box-shadow: 0 4px 15px rgba(0,0,0,0.4); border-left: 4px solid #10b981; }
        .minimized { height: 0; padding: 0 !important; overflow: hidden; border: none !important; margin: 0 !important; }

        /* 履歴カード */
        #history-list { flex: 1; display: flex; gap: 10px; overflow-x: auto; padding: 5px; -webkit-overflow-scrolling: touch; }
        .history-card { width: 70px; height: 90px; background: #2d3748; border-radius: 12px; border: 2px solid #10b981; overflow: hidden; flex-shrink: 0; transition: transform 0.2s; }
        .history-card:active { transform: scale(0.9); }
        .history-card img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body class="bg-gray-900 text-white overflow-hidden font-sans text-xs flex flex-col h-screen">

<div id="ready-screen" class="fixed inset-0 z-[300] bg-black flex flex-col items-center justify-center">
    <h1 class="text-xl font-bold text-green-400 mb-10 tracking-widest">RECEIPT SCANNER</h1>
    <button onclick="startApp()" class="bg-green-600 px-16 py-5 rounded-xl font-bold text-lg shadow-2xl active:scale-95 transition-all">スキャンを開始する</button>
</div>

<div id="preview-overlay">
    <div class="absolute inset-0 flex items-center justify-center p-2">
        <img id="preview-img" src="" class="max-w-full max-h-full object-contain transition-transform">
    </div>
    <div id="hud-panel" class="space-y-4 max-w-md mx-auto">
        <div class="grid grid-cols-2 gap-3 text-sm">
            <input type="text" id="edit-date" class="bg-white/10 border border-white/20 rounded-lg p-3 text-white" placeholder="日付">
            <input type="text" id="edit-shop" class="bg-white/10 border border-white/20 rounded-lg p-3 text-white" placeholder="店名">
        </div>
        
        <div id="edit-items-area" class="space-y-2 max-h-32 overflow-y-auto bg-black/20 p-2 rounded-lg">
            </div>

        <div class="relative">
            <span class="absolute left-4 top-3 text-blue-400 text-2xl font-bold">¥</span>
            <input type="number" id="edit-amount" class="w-full bg-black/40 border border-white/20 rounded-xl py-4 pl-12 text-4xl font-mono text-blue-400 outline-none" placeholder="0">
        </div>
        <div class="flex gap-4">
            <button onclick="closePreview(false)" class="flex-1 bg-gray-600/50 py-4 rounded-xl font-bold">破棄</button>
            <button onclick="closePreview(true)" class="flex-1 bg-blue-600/80 py-4 rounded-xl font-bold">反映して次へ</button>
        </div>
    </div>
</div>

<div class="fixed top-0 left-0 right-0 p-4 z-50 flex items-start justify-between pointer-events-none">
    <div class="flex flex-col gap-2 pointer-events-auto">
        <div id="msg-box" class="p-3 rounded-lg font-bold transition-all minimized">
            <p id="msg" class="leading-tight text-[11px]">準備完了</p>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleMsg()" class="bg-black/60 p-2.5 rounded-full border border-white/20">▼</button>
            <button onclick="resumeScanner()" class="bg-green-600/90 px-5 py-1.5 rounded-full text-[10px] font-bold shadow-lg">▶ 再生</button>
            <button onclick="pauseScanner()" class="bg-red-600/90 px-5 py-1.5 rounded-full text-[10px] font-bold shadow-lg">■ 停止</button>
        </div>
        <div class="flex bg-black/60 p-1 rounded-full border border-white/20 w-fit">
            <button id="mode-speed" onclick="setSpeedMode(true)" class="px-4 py-1 rounded-full text-[9px] font-bold bg-green-600">自動撮影</button>
            <button id="mode-normal" onclick="setSpeedMode(false)" class="px-4 py-1 rounded-full text-[9px] font-bold">確認撮影</button>
        </div>
    </div>
    <button class="bg-black/60 p-3 rounded-full border border-white/20 text-xl pointer-events-auto active:rotate-45 transition-transform">⚙</button>
</div>

<div id="camera-container" class="flex-1 relative bg-black">
    <div id="crosshair" class="crosshair">
        <div class="crosshair-line crosshair-h"></div>
        <div class="crosshair-line crosshair-v"></div>
    </div>
</div>

<div class="fixed bottom-0 left-0 right-0 z-[50] bg-gradient-to-t from-black pt-16 pb-8 px-4 flex items-end gap-3 pointer-events-none">
    <button class="flex-none w-16 h-16 rounded-2xl bg-green-600 flex items-center justify-center pointer-events-auto active:scale-90 text-2xl shadow-2xl">💾</button>
    <div id="history-list" class="pointer-events-auto"></div>
</div>

<canvas id="proc-canvas" class="hidden"></canvas>

<script>
let isProcessing = false, isPaused = true, historyData = [], currentIndex = -1, videoEl = null, speedMode = true;
let scale = 1, pointX = 0, pointY = 0, startX = 0, startY = 0, evCache = [], prevDiff = -1, isPinching = false;
let audioCtx;

async function startApp() {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    document.getElementById('ready-screen').style.display = 'none';
    await initCamera();
    resumeScanner();
}

function setSpeedMode(s) {
    speedMode = s;
    document.getElementById('mode-speed').className = s ? "px-4 py-1 rounded-full text-[9px] font-bold bg-green-600" : "px-4 py-1 rounded-full text-[9px] font-bold";
    document.getElementById('mode-normal').className = !s ? "px-4 py-1 rounded-full text-[9px] font-bold bg-blue-600" : "px-4 py-1 rounded-full text-[9px] font-bold";
}

function toggleMsg() { document.getElementById('msg-box').classList.toggle('minimized'); }
function pauseScanner() { isPaused = true; isProcessing = false; document.getElementById('crosshair').classList.remove('blinking'); document.getElementById('msg').innerText = "一時停止中"; }
function resumeScanner() { isPaused = false; isProcessing = false; document.getElementById('crosshair').classList.add('blinking'); document.getElementById('msg').innerText = "スキャン待機中..."; }

async function initCamera() {
    try {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1280 } } });
        videoEl = document.createElement('video'); videoEl.srcObject = s; videoEl.setAttribute('playsinline', ''); videoEl.play();
        videoEl.className = "w-full h-full object-cover"; document.getElementById('camera-container').prepend(videoEl);
        setInterval(() => detect(videoEl), 250);
    } catch (e) { alert("Camera Error: " + e.message); }
}

function playBeepAndCapture(v) {
    if(!audioCtx || isProcessing) return;
    isProcessing = true;

    // ビープ音
    const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
    o.type = 'sine'; o.frequency.setValueAtTime(880, audioCtx.currentTime);
    g.gain.setValueAtTime(0.1, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + 0.1);

    // キャプチャ
    const c = document.createElement('canvas'); c.width = v.videoWidth; c.height = v.videoHeight;
    c.getContext('2d').drawImage(v, 0, 0);
    
    // AI連携を見据えたデータ構造
    const newEntry = { 
        img: c.toDataURL('image/jpeg', 0.6), 
        amount: "", 
        shop: "", 
        items: [], // [ {cat: "食費", price: 100}, ... ]
        date: new Date().toLocaleDateString() 
    };
    historyData.unshift(newEntry);
    updateHistoryUI();

    if (!speedMode) {
        openPreview(0);
    } else {
        document.getElementById('msg').innerText = `${historyData.length}件保存。3秒ロック...`;
        setTimeout(() => { if(!isPaused) isProcessing = false; document.getElementById('msg').innerText = "スキャン中..."; }, 3000);
    }
}

function detect(v) {
    if (isProcessing || isPaused || !v.videoWidth) return;
    const c = document.getElementById('proc-canvas'); const ctx = c.getContext('2d'); ctx.drawImage(v, 0, 0, 100, 100);
    const p = ctx.getImageData(0, 0, 100, 100).data; let white = 0;
    for (let i = 0; i < p.length; i += 4) { 
        if (p[i] > 200 && p[i+1] > 200 && p[i+2] > 200) white++; 
    }
    // 白さが全体の15%〜50%の時だけ反応（安定性向上）
    const ratio = white / 10000;
    if (ratio > 0.15 && ratio < 0.50) playBeepAndCapture(v);
}

function openPreview(i) {
    currentIndex = i;
    isProcessing = true;
    const it = historyData[i]; 
    document.getElementById('preview-img').src = it.img;
    document.getElementById('edit-date').value = it.date; 
    document.getElementById('edit-shop').value = it.shop;
    document.getElementById('edit-amount').value = it.amount;
    
    // 項目羅列エリアの更新
    const area = document.getElementById('edit-items-area');
    area.innerHTML = it.items.length ? "" : "<p class='text-gray-400 text-center italic'>項目未解析</p>";
    it.items.forEach(item => {
        const row = document.createElement('div');
        row.className = "flex justify-between text-[10px] bg-white/5 p-1 rounded";
        row.innerHTML = `<span>${item.cat}</span><span>¥${item.price}</span>`;
        area.appendChild(row);
    });

    document.getElementById('preview-overlay').style.display = 'block';
    // ズームリセット
    scale = 1; pointX = 0; pointY = 0; updateTransform();
}

function closePreview(save) {
    if (save && currentIndex !== -1) {
        const it = historyData[currentIndex];
        it.date = document.getElementById('edit-date').value; 
        it.shop = document.getElementById('edit-shop').value;
        it.amount = document.getElementById('edit-amount').value;
        updateHistoryUI();
    }
    document.getElementById('preview-overlay').style.display = 'none';
    setTimeout(() => { if (!isPaused) isProcessing = false; }, 2000);
}

function updateHistoryUI() {
    const l = document.getElementById('history-list'); l.innerHTML = "";
    historyData.forEach((d, i) => {
        const card = document.createElement('div'); card.className = "history-card"; card.onclick = () => openPreview(i);
        card.innerHTML = `<img src="${d.img}">`; l.appendChild(card);
    });
    l.scrollLeft = 0;
}

// ズーム/移動ロジック
const pImg = document.getElementById('preview-img');
function updateTransform() { pImg.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`; }
pImg.onpointerdown = (ev) => { evCache.push(ev); startX = ev.clientX - pointX; startY = ev.clientY - pointY; };
pImg.onpointermove = (ev) => {
    for (let i = 0; i < evCache.length; i++) { if (ev.pointerId == evCache[i].pointerId) { evCache[i] = ev; break; } }
    if (evCache.length == 2) {
        isPinching = true;
        let d = Math.sqrt(Math.pow(evCache[0].clientX - evCache[1].clientX, 2) + Math.pow(evCache[0].clientY - evCache[1].clientY, 2));
        if (prevDiff > 0) { if (d > prevDiff) scale += 0.03; else if (scale > 0.5) scale -= 0.03; }
        prevDiff = d;
    } else if (evCache.length == 1 && !isPinching) {
        pointX = ev.clientX - startX; pointY = ev.clientY - startY;
    }
    updateTransform();
};
pImg.onpointerup = (ev) => { 
    for (let i = 0; i < evCache.length; i++) { if (evCache[i].pointerId == ev.pointerId) { evCache.splice(i, 1); break; } } 
    if (evCache.length < 2) { prevDiff = -1; isPinching = false; } 
};
</script>
</body>
</html>
