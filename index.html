<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>爆速レシートおばちゃん v1.9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .scan-area { position: absolute; top: 12%; bottom: 38%; left: 10%; right: 10%; z-index: 20; }
        .corner { position: absolute; width: 30px; height: 30px; border-color: rgba(74, 222, 128, 0.3); border-style: solid; transition: border-color 0.1s; }
        .top-left { top: 0; left: 0; border-width: 6px 0 0 6px; }
        .top-right { top: 0; right: 0; border-width: 6px 6px 0 0; }
        .bottom-left { bottom: 0; left: 0; border-width: 0 0 6px 6px; }
        .bottom-right { bottom: 0; right: 0; border-width: 0 6px 6px 0; }
        .detected .corner { border-color: rgba(74, 222, 128, 1); filter: drop-shadow(0 0 10px rgba(74, 222, 128, 0.8)); }
        
        #preview-overlay { position: fixed; inset: 0; z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(10px); background: rgba(0,0,0,0.95); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* メッセージエリアの制御 */
        #msg-box { transition: all 0.3s ease; max-height: 200px; overflow: hidden; }
        #msg-box.minimized { max-height: 40px; opacity: 0.8; }
    </style>
</head>
<body class="bg-gray-900 text-white overflow-hidden font-sans text-xs">

    <div id="preview-overlay" class="p-4">
        <div class="w-full max-w-sm bg-gray-800 rounded-3xl overflow-hidden shadow-2xl border border-gray-700 flex flex-col max-h-[90vh]">
            <div class="relative h-44 bg-black flex-none">
                <img id="preview-img" class="w-full h-full object-contain">
            </div>
            <div class="p-4 space-y-3 overflow-y-auto no-scrollbar">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="edit-date" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-xs text-white" placeholder="Date">
                    <input type="text" id="edit-shop" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-xs text-white" placeholder="Shop">
                </div>
                <select id="edit-category" class="w-full bg-gray-900 border border-gray-600 rounded p-2 text-sm text-white">
                    <option>食費</option><option>日用品</option><option>交通費</option><option>交際費</option><option>その他</option>
                </select>
                <div class="relative">
                    <span class="absolute left-3 top-2 text-gray-500 text-lg">¥</span>
                    <input type="number" id="edit-amount" class="w-full bg-gray-900 border border-gray-600 rounded-lg py-2 pl-8 text-2xl font-mono text-blue-400 outline-none">
                </div>
            </div>
            <div class="p-4 bg-gray-800/50 border-t border-gray-700 flex gap-2">
                <button onclick="closePreview(false)" class="flex-1 bg-gray-700 py-3 rounded-xl font-bold">キャンセル</button>
                <button onclick="closePreview(true)" class="flex-1 bg-blue-600 py-3 rounded-xl font-bold">編集を反映</button>
            </div>
        </div>
    </div>

    <div class="fixed top-0 left-0 right-0 p-4 z-50 bg-gradient-to-b from-black/80 flex items-start gap-2">
        <div class="text-4xl flex-none">👵</div>
        <div class="flex-1">
            <div id="msg-box" class="bg-white p-2 rounded-lg rounded-tl-none shadow-xl border-2 border-green-500 text-gray-800 font-bold mb-2">
                <p id="msg" class="leading-tight text-[10px]">スキャンの準備はいいかい？<br>ボタンでいつでも止められるよ！</p>
            </div>
            <div class="flex gap-2">
                <button onclick="toggleMsg()" class="bg-gray-800/80 px-3 py-1 rounded-full border border-white/20 text-[10px] shadow-lg active:scale-95">▼</button>
                <button id="stop-btn" onclick="pauseScanner()" class="bg-red-900/80 px-4 py-1 rounded-full border border-red-500/50 text-[10px] shadow-lg active:scale-95">■ 停止</button>
                <button id="play-btn" onclick="resumeScanner()" class="bg-green-900/80 px-4 py-1 rounded-full border border-green-500/50 text-[10px] shadow-lg active:scale-95">▶ 再生</button>
            </div>
        </div>
    </div>

    <div id="camera-container" class="w-full h-screen relative bg-black overflow-hidden">
        <div id="placeholder" class="absolute inset-0 flex items-center justify-center text-gray-700 text-[10px] uppercase">Waiting for Play...</div>
        <div id="scan-frame" class="scan-area pointer-events-none">
            <div class="corner top-left"></div><div class="corner top-right"></div>
            <div class="corner bottom-left"></div><div class="corner bottom-right"></div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 z-40 bg-gradient-to-t from-black via-black/95 to-transparent pt-12 pb-8 px-4">
        <div class="flex items-end gap-3 mb-4">
            <button onclick="alert('一括保存の準備中！')" class="flex-none w-14 h-14 rounded-2xl bg-green-600 flex items-center justify-center shadow-lg active:scale-90 transition-transform">
                <svg class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" /></svg>
            </button>
            <div id="history-list" class="flex-1 flex gap-2 overflow-x-auto no-scrollbar min-h-[85px] items-end px-1 italic text-[8px] text-gray-700">NO DATA</div>
        </div>
        <div class="flex justify-between items-end border-t border-gray-800 pt-2 px-1 text-[9px]">
            <div id="status" class="text-gray-600 font-black tracking-widest uppercase italic">v1.9 CONTROL-PANEL</div>
            <div id="debug-state" class="text-red-500 font-bold">PAUSED</div>
        </div>
    </div>

    <canvas id="proc-canvas" class="hidden"></canvas>

    <script>
        let isProcessing = false;
        let isPaused = true; // 最初は停止状態
        let history = [];
        let currentIndex = -1;
        let videoEl = null;

        // 縮小ボタンの動作
        function toggleMsg() {
            document.getElementById('msg-box').classList.toggle('minimized');
        }

        // 停止ボタン
        function pauseScanner() {
            isPaused = true;
            document.getElementById('debug-state').innerText = "PAUSED";
            document.getElementById('debug-state').classList.replace('text-green-500', 'text-red-500');
            document.getElementById('msg').innerText = "スキャンを止めたよ。ゆっくり準備しな。";
        }

        // 再生ボタン（開始/再開）
        async function resumeScanner() {
            if (!videoEl) {
                await initCamera();
            }
            isPaused = false;
            document.getElementById('debug-state').innerText = "RUNNING";
            document.getElementById('debug-state').classList.replace('text-red-500', 'text-green-500');
            document.getElementById('msg').innerText = "スキャン再開！レシートを見せておくれ！";
        }

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1280 } } });
                videoEl = document.createElement('video');
                videoEl.srcObject = stream; videoEl.setAttribute('playsinline', ''); videoEl.play();
                videoEl.className = "w-full h-full object-cover";
                document.getElementById('placeholder').replaceWith(videoEl);
                setInterval(() => detect(videoEl), 200);
            } catch (e) { alert("カメラが必要です"); }
        }

        function detect(video) {
            if (isProcessing || isPaused || !video.videoWidth) return;
            const canvas = document.getElementById('proc-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 100; canvas.height = 100;
            ctx.drawImage(video, 0, 0, 100, 100);
            const pixels = ctx.getImageData(0, 0, 100, 100).data;
            let whiteCount = 0;
            for (let i = 0; i < pixels.length; i += 4) {
                if (pixels[i] > 185 && pixels[i+1] > 185 && pixels[i+2] > 185) whiteCount++;
            }
            if (whiteCount / 10000 > 0.08) capture(video);
        }

        function capture(video) {
            isProcessing = true;
            const saveCanvas = document.createElement('canvas');
            saveCanvas.width = video.videoWidth; saveCanvas.height = video.videoHeight;
            saveCanvas.getContext('2d').drawImage(video, 0, 0);
            history.unshift({ img: saveCanvas.toDataURL('image/jpeg', 0.5), amount: "", shop: "", category: "食費", date: new Date().toLocaleDateString() });
            updateHistoryUI();
            setTimeout(() => { isProcessing = false; }, 2500);
        }

        function updateHistoryUI() {
            const list = document.getElementById('history-list');
            list.innerHTML = "";
            history.forEach((data, index) => {
                const card = document.createElement('div');
                card.className = "history-card flex-none shadow-lg";
                card.onclick = () => openPreview(index);
                card.innerHTML = `<img src="${data.img}" class="w-full h-full object-cover">`;
                list.appendChild(card);
            });
        }

        function openPreview(index) {
            currentIndex = index;
            isPaused = true;
            document.getElementById('preview-img').src = history[index].img;
            document.getElementById('edit-date').value = history[index].date;
            document.getElementById('edit-shop').value = history[index].shop;
            document.getElementById('edit-category').value = history[index].category;
            document.getElementById('edit-amount').value = history[index].amount;
            document.getElementById('preview-overlay').style.display = 'flex';
        }

        function closePreview(reflect = true) {
            if (reflect && currentIndex !== -1) {
                history[currentIndex].date = document.getElementById('edit-date').value;
                history[currentIndex].shop = document.getElementById('edit-shop').value;
                history[currentIndex].category = document.getElementById('edit-category').value;
                history[currentIndex].amount = document.getElementById('edit-amount').value;
            }
            document.getElementById('preview-overlay').style.display = 'none';
            // プレビューを閉じても勝手に再開せず、元の停止/再生状態を維持するか、
            // もしくは自動再開させたい場合は here に resumeScanner() を入れる。
            // 今は安全のために停止状態のままにしておきます。
        }
    </script>
</body>
</html>
