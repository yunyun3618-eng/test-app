<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TaxHelper Pro v2.8.41</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .crosshair { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); width: 44px; height: 44px; z-index: 20; pointer-events: none; }
        .crosshair-line { position: absolute; background-color: #4ade80; }
        .crosshair-h { top: 21px; left: 0; width: 44px; height: 2px; }
        .crosshair-v { top: 0; left: 21px; width: 2px; height: 44px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        .blinking { animation: blink 1.2s infinite; }
        #preview-overlay { position: fixed; inset: 0; z-index: 200; display: none; background: #000; }
        #preview-img { width: 100%; height: 100%; object-fit: cover; }
        #hud-panel { position: absolute; bottom: 30px; left: 12px; right: 12px; background: rgba(30, 41, 59, 0.9); border-radius: 20px; padding: 20px; z-index: 210; }
        .history-card { width: 70px; height: 90px; background: #2d3748; border-radius: 12px; overflow: hidden; flex-shrink: 0; border: 2px solid #10b981; }
    </style>
</head>
<body class="bg-gray-900 text-white overflow-hidden font-sans text-xs flex flex-col h-screen" onload="preInitCamera()">

<div id="ready-screen" class="fixed inset-0 z-[500] bg-black/80 flex flex-col items-center justify-center p-6 text-center">
    <h1 class="text-2xl font-bold text-green-400 mb-6 tracking-widest">RECEIPT SCANNER</h1>
    <button onclick="startApp(false)" class="bg-green-600 px-16 py-5 rounded-2xl font-bold text-lg w-64 shadow-2xl">新しく始める</button>
    <div id="recover-panel" class="hidden mt-8 pt-8 border-t border-white/20 w-64">
        <p class="text-blue-400 mb-4 font-bold text-center">中断したデータがあります</p>
        <button onclick="startApp(true)" class="bg-blue-600 px-8 py-4 rounded-2xl font-bold w-full">続きから再開</button>
    </div>
</div>

<div id="camera-container" class="flex-1 relative bg-black flex items-center justify-center overflow-hidden">
    <div id="crosshair" class="crosshair"><div class="crosshair-line crosshair-h"></div><div class="crosshair-line crosshair-v"></div></div>
</div>

<div class="fixed top-0 left-0 right-0 p-4 z-50 flex flex-col gap-2 pointer-events-none">
    <div class="bg-white text-black p-3 rounded-lg font-bold w-40 pointer-events-auto">
        <p id="msg">準備中...</p>
        <div class="flex gap-2 mt-2">
            <button onclick="resumeScanner()" class="bg-green-600 text-white flex-1 py-2 rounded text-[10px]">▶再生</button>
            <button onclick="pauseScanner()" class="bg-red-600 text-white flex-1 py-2 rounded text-[10px]">■停止</button>
        </div>
    </div>
</div>

<div class="fixed bottom-0 left-0 right-0 z-[100] pb-8 px-4 flex items-end gap-3 pointer-events-none">
    <button class="flex-none w-16 h-16 rounded-2xl bg-green-600 flex items-center justify-center pointer-events-auto text-2xl" onclick="finalSave()">💾</button>
    <div id="history-list" class="flex-1 flex gap-2 overflow-x-auto pointer-events-auto px-2"></div>
</div>

<div id="preview-overlay">
    <img id="preview-img" src="">
    <div id="hud-panel" class="space-y-4">
        <div class="grid grid-cols-2 gap-3">
            <input type="text" id="edit-date" class="bg-white/10 p-3 rounded text-white" placeholder="日付">
            <input type="text" id="edit-shop" class="bg-white/10 p-3 rounded text-white" placeholder="店名">
        </div>
        <input type="number" id="edit-amount" class="w-full bg-black/40 p-4 rounded text-center text-4xl text-blue-400 font-bold" placeholder="金額">
        <div class="flex gap-4">
            <button onclick="closePreview(false)" class="flex-1 bg-gray-600 py-4 rounded font-bold">破棄</button>
            <button onclick="closePreview(true)" class="flex-1 bg-blue-600 py-4 rounded font-bold">反映</button>
        </div>
    </div>
</div>

<canvas id="proc-canvas" class="hidden"></canvas>

<script>
const STATE_IDLE=1, STATE_KEEP=2, STATE_CAPTURE=3, STATE_EJECT=4, STATE_RESET=5;
let currentPhase=STATE_IDLE, isPaused=true, historyData=[], currentIndex=-1, videoEl=null, stabilityCounter=0;

/* ★監督指示：2秒リズム設定（THRESHOLD=8） */
const WHITE_THRESHOLD=185, RATIO_LOW=0.05, RATIO_HIGH=0.15, STABILITY_THRESHOLD=8; 

async function preInitCamera() {
    try {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1280 } } });
        videoEl = document.createElement('video'); videoEl.srcObject = s; videoEl.setAttribute('playsinline', ''); videoEl.play();
        videoEl.className = "w-full h-full object-cover";
        document.getElementById('camera-container').prepend(videoEl);
        setInterval(() => { if(!isPaused && videoEl.readyState === 4) runLoop(videoEl); }, 250);
        document.getElementById('msg').innerText = "準備完了";
    } catch (e) { document.getElementById('msg').innerText = "エラー"; }
}

function startApp(useRecover) {
    if (useRecover) {
        const b = localStorage.getItem('taxhelper_backup');
        if (b) { historyData = JSON.parse(b); updateHistoryUI(); }
    }
    document.getElementById('ready-screen').style.display = 'none';
    isPaused = false;
    document.getElementById('crosshair').classList.add('blinking');
}

function runLoop(v) {
    if (isPaused) return;
    const c=document.getElementById('proc-canvas'), ctx=c.getContext('2d');
    ctx.drawImage(v, 0, 0, 100, 100);
    const p=ctx.getImageData(0, 0, 100, 100).data;
    let white=0; for(let i=0; i<p.length; i+=4) if(p[i]>WHITE_THRESHOLD && p[i+1]>WHITE_THRESHOLD && p[i+2]>WHITE_THRESHOLD) white++;
    const ratio = white / 10000;

    switch (currentPhase) {
        case STATE_IDLE: 
            document.getElementById('msg').innerText = "レシート待ち";
            if (ratio > RATIO_HIGH) { currentPhase = STATE_KEEP; stabilityCounter = 0; }
            break;
        case STATE_KEEP: 
            document.getElementById('msg').innerText = "そのままキープしてね";
            if (ratio > RATIO_HIGH) {
                stabilityCounter++; 
                if (stabilityCounter >= STABILITY_THRESHOLD) currentPhase = STATE_CAPTURE;
            } else { currentPhase = STATE_IDLE; }
            break;
        case STATE_CAPTURE: 
            triggerCapture(v); currentPhase = STATE_EJECT; 
            break;
        case STATE_EJECT: 
            document.getElementById('msg').innerText = "どけてください";
            if (ratio < RATIO_LOW) currentPhase = STATE_RESET;
            break;
        case STATE_RESET: stabilityCounter=0; currentPhase=STATE_IDLE; break;
    }
}

function triggerCapture(v) {
    const c=document.createElement('canvas'); c.width=v.videoWidth; c.height=v.videoHeight;
    c.getContext('2d').drawImage(v, 0, 0);
    historyData.unshift({ img: c.toDataURL('image/jpeg', 0.6), amount: "", shop: "", date: new Date().toLocaleDateString() });
    updateHistoryUI(); openPreview(0); 
}

function openPreview(i) {
    currentIndex=i; isPaused=true;
    const it=historyData[i];
    document.getElementById('preview-img').src=it.img;
    document.getElementById('edit-date').value=it.date;
    document.getElementById('edit-shop').value=it.shop;
    document.getElementById('edit-amount').value=it.amount;
    document.getElementById('preview-overlay').style.display='block';
    document.getElementById('crosshair').classList.remove('blinking');
}

function closePreview(save) {
    if (currentIndex !== -1 && save) {
        const it=historyData[currentIndex];
        it.date=document.getElementById('edit-date').value;
        it.shop=document.getElementById('edit-shop').value;
        it.amount=document.getElementById('edit-amount').value;
    } else if (currentIndex !== -1) { historyData.splice(currentIndex, 1); }
    updateHistoryUI(); document.getElementById('preview-overlay').style.display='none';
    isPaused=false; document.getElementById('crosshair').classList.add('blinking');
}

function pauseScanner() { isPaused=true; document.getElementById('crosshair').classList.remove('blinking'); }
function resumeScanner() { isPaused=false; document.getElementById('crosshair').classList.add('blinking'); }

function updateHistoryUI() {
    const l=document.getElementById('history-list'); l.innerHTML="";
    historyData.forEach((d, i) => {
        const card=document.createElement('div'); card.className="history-card"; card.onclick=()=>openPreview(i);
        card.innerHTML=`<img src="${d.img}" class="w-full h-full object-cover">`; l.appendChild(card);
    });
}

function finalSave() { if(historyData.length) alert(historyData.length + "件確定"); }
</script>
</body>
</html>
