<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>爆速レシートおばちゃん v2.2.3-PerfectRestore</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .scan-area { position: absolute; top: 20%; height: 35%; left: 10%; right: 10%; z-index: 20; }
        .corner { position: absolute; width: 30px; height: 30px; border-color: rgba(74, 222, 128, 0.5); border-style: solid; }
        .top-left { top: 0; left: 0; border-width: 6px 0 0 6px; }
        .top-right { top: 0; right: 0; border-width: 6px 6px 0 0; }
        .bottom-left { bottom: 0; left: 0; border-width: 0 0 6px 6px; }
        .bottom-right { bottom: 0; right: 0; border-width: 0 6px 6px 0; }
        
        #overlay-layer { position: fixed; inset: 0; z-index: 200; display: none; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px); align-items: center; justify-content: center; }
        #ready-screen { position: fixed; inset: 0; z-index: 300; background: #111; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        #preview-overlay { position: fixed; inset: 0; z-index: 100; display: none; background: #000; }
        #hud-panel { position: absolute; bottom: 20px; left: 15px; right: 15px; background: rgba(31, 41, 55, 0.95); border-radius: 24px; padding: 20px; z-index: 110; }
        
        #msg-box { background: rgba(255, 255, 255, 0.95) !important; color: #111 !important; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .minimized { height: 0; padding: 0 !important; overflow: hidden; margin: 0 !important; border: none !important; }

        /* カード表示のバグを修正したレイアウト */
        #history-list { flex: 1; display: flex; gap: 10px; overflow-x: auto; padding: 5px 10px; -webkit-overflow-scrolling: touch; }
        #history-list::-webkit-scrollbar { display: none; }
        .history-card { width: 70px; height: 90px; background: #2d3748; border-radius: 8px; border: 2px solid #10b981; overflow: hidden; flex-shrink: 0; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .history-card img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body class="bg-gray-900 text-white overflow-hidden font-sans text-xs">

    <div id="ready-screen">
        <div class="text-6xl mb-6">👵</div>
        <h1 class="text-xl font-black text-green-400 mb-8">爆速レシートおばちゃん</h1>
        <button onclick="startApp()" class="bg-green-600 px-12 py-5 rounded-full font-black text-lg shadow-2xl active:scale-95">おばちゃんを呼ぶ</button>
    </div>

    <div id="overlay-layer">
        <div class="bg-gray-800 p-8 rounded-3xl border border-gray-700 text-center max-w-xs w-full mx-4">
            <h2 id="overlay-title" class="text-lg font-bold mb-2"></h2>
            <p id="overlay-msg" class="text-gray-400 text-[10px] mb-6"></p>
            <button onclick="closeOverlay()" class="w-full bg-gray-700 py-3 rounded-xl font-bold">戻る</button>
        </div>
    </div>

    <div id="preview-overlay">
        <div class="absolute inset-0 flex items-center justify-center p-2"><img id="preview-img" src="" class="max-w-full max-h-full object-contain"></div>
        <div id="hud-panel" class="space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <input type="text" id="edit-date" class="bg-black/50 border border-white/20 rounded-lg p-2 text-white">
                <input type="text" id="edit-shop" class="bg-black/50 border border-white/20 rounded-lg p-2 text-white" placeholder="店名">
            </div>
            <select id="edit-category" class="w-full bg-black/50 border border-white/20 rounded-lg p-3 text-white">
                <option>食費</option><option>日用品</option><option>交通費</option><option>交際費</option><option>その他</option>
            </select>
            <div class="relative">
                <span class="absolute left-4 top-2 text-blue-400 text-xl font-bold">¥</span>
                <input type="number" id="edit-amount" class="w-full bg-black/50 border border-white/20 rounded-xl py-3 pl-10 text-3xl font-mono text-blue-400 outline-none">
            </div>
            <div class="flex gap-3">
                <button onclick="closePreview(false)" class="flex-1 bg-gray-700 py-4 rounded-2xl font-bold">キャンセル</button>
                <button onclick="closePreview(true)" class="flex-1 bg-blue-600 py-4 rounded-2xl font-bold">反映</button>
            </div>
        </div>
    </div>

    <div class="fixed top-0 left-0 right-0 p-4 z-50 flex items-start justify-between">
        <div class="flex items-start gap-2">
            <div class="text-4xl">👵</div>
            <div class="flex flex-col gap-2">
                <div id="msg-box" class="p-2 rounded-lg rounded-tl-none border-2 border-green-500 font-bold transition-all">
                    <p id="msg" class="leading-tight text-[11px]">準備はいいかい？</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="toggleMsg()" class="bg-black/70 px-3 py-1 rounded-full border border-white/30 text-[10px]">▼</button>
                    <button onclick="resumeScanner()" class="bg-green-600/80 px-4 py-1 rounded-full text-[10px] font-bold shadow-lg">▶ 再生</button>
                    <button onclick="pauseScanner()" class="bg-red-600/80 px-4 py-1 rounded-full text-[10px] font-bold shadow-lg">■ 停止</button>
                </div>
                <div class="flex bg-black/60 p-1 rounded-full border border-white/20 w-fit">
                    <button id="mode-speed" onclick="setSpeedMode(true)" class="px-3 py-1 rounded-full text-[9px] font-bold bg-green-600">爆速</button>
                    <button id="mode-normal" onclick="setSpeedMode(false)" class="px-3 py-1 rounded-full text-[9px] font-bold">通常</button>
                </div>
            </div>
        </div>
        <button onclick="openOverlay('設定画面', '調整中だよ！')" class="bg-black/70 p-3 rounded-full border border-white/30 text-white">⚙</button>
    </div>

    <div id="camera-container" class="w-full h-screen bg-black relative overflow-hidden">
        <div id="scan-frame" class="scan-area pointer-events-none">
            <div class="corner top-left"></div><div class="corner top-right"></div>
            <div class="corner bottom-left"></div><div class="corner bottom-right"></div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 z-[50] bg-gradient-to-t from-black pt-12 pb-8 px-4 flex items-end gap-3 pointer-events-none">
        <button onclick="openOverlay('データ保存', '保存機能は調整中！')" class="flex-none w-14 h-14 rounded-2xl bg-green-600 flex items-center justify-center shadow-lg pointer-events-auto active:scale-90">💾</button>
        <div id="history-list" class="pointer-events-auto"></div>
    </div>

    <canvas id="proc-canvas" class="hidden"></canvas>

    <script>
        let isProcessing = false, isPaused = true, history = [], currentIndex = -1, videoEl = null, speedMode = true;
        let scale = 1, pointX = 0, pointY = 0, startX = 0, startY = 0, evCache = [], prevDiff = -1, isPinching = false;
        let audioCtx;

        async function startApp() { 
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('ready-screen').style.display = 'none'; 
            await initCamera(); 
            resumeScanner(); 
        }

        function setSpeedMode(isSpeed) {
            speedMode = isSpeed;
            document.getElementById('mode-speed').className = isSpeed ? "px-3 py-1 rounded-full text-[9px] font-bold bg-green-600" : "px-3 py-1 rounded-full text-[9px] font-bold";
            document.getElementById('mode-normal').className = !isSpeed ? "px-3 py-1 rounded-full text-[9px] font-bold bg-blue-600" : "px-3 py-1 rounded-full text-[9px] font-bold";
        }

        function openOverlay(title, msg) { document.getElementById('overlay-title').innerText = title; document.getElementById('overlay-msg').innerText = msg; document.getElementById('overlay-layer').style.display = 'flex'; }
        function closeOverlay() { document.getElementById('overlay-layer').style.display = 'none'; }
        function toggleMsg() { document.getElementById('msg-box').classList.toggle('minimized'); }
        
        function pauseScanner() { isPaused = true; isProcessing = false; document.getElementById('msg').innerText = "止まったよ。準備できたら再生押して。"; }
        function resumeScanner() { isPaused = false; isProcessing = false; document.getElementById('msg').innerText = "スキャン中！レシート見せて！"; }
        
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1280 } } });
                videoEl = document.createElement('video'); videoEl.srcObject = stream; videoEl.setAttribute('playsinline', ''); videoEl.play();
                videoEl.className = "w-full h-full object-cover"; document.getElementById('camera-container').prepend(videoEl);
                setInterval(() => detect(videoEl), 250);
            } catch (e) { alert("カメラ起動失敗"); }
        }

        function playBeep() {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function detect(video) {
            if (isProcessing || isPaused || !video.videoWidth) return;
            const canvas = document.getElementById('proc-canvas'); const ctx = canvas.getContext('2d'); canvas.width = 100; canvas.height = 100; ctx.drawImage(video, 0, 0, 100, 100);
            const p = ctx.getImageData(0, 0, 100, 100).data; let w = 0;
            for (let i = 0; i < p.length; i += 4) { if (p[i] > 190 && p[i+1] > 190 && p[i+2] > 190) w++; }
            if (w / 10000 > 0.1) capture(video);
        }

        function capture(video) {
            isProcessing = true; playBeep();
            const c = document.createElement('canvas'); c.width = video.videoWidth; c.height = video.videoHeight; c.getContext('2d').drawImage(video, 0, 0);
            history.unshift({ img: c.toDataURL('image/jpeg', 0.5), amount: "", shop: "", category: "食費", date: new Date().toLocaleDateString() });
            updateHistoryUI();
            if (!speedMode) openPreview(0);
            else { document.getElementById('msg').innerText = `${history.length}枚目保存したよ。`; setTimeout(() => { if(!isPaused) isProcessing = false; }, 3000); }
        }

        function openPreview(i) {
            currentIndex = i; isPaused = true;
            const it = history[i]; document.getElementById('preview-img').src = it.img;
            document.getElementById('edit-date').value = it.date; document.getElementById('edit-shop').value = it.shop;
            document.getElementById('edit-category').value = it.category; document.getElementById('edit-amount').value = it.amount;
            document.getElementById('preview-overlay').style.display = 'block';
        }

        function closePreview(ref) {
            if (ref && currentIndex !== -1) {
                const it = history[currentIndex];
                it.date = document.getElementById('edit-date').value; it.shop = document.getElementById('edit-shop').value;
                it.category = document.getElementById('edit-category').value; it.amount = document.getElementById('edit-amount').value;
                updateHistoryUI();
            }
            document.getElementById('preview-overlay').style.display = 'none';
            document.getElementById('msg').innerText = "スキャン再開まで3秒...";
            // 停止ボタンを効かせるため isPaused をチェック
            setTimeout(() => { if(!isPaused) { isProcessing = false; document.getElementById('msg').innerText = "スキャン中！"; } }, 3000);
        }

        function updateHistoryUI() {
            const l = document.getElementById('history-list'); l.innerHTML = "";
            history.forEach((d, i) => {
                const card = document.createElement('div'); card.className = "history-card"; card.onclick = () => openPreview(i);
                card.innerHTML = `<img src="${d.img}">`; l.appendChild(card);
            });
        }

        // プレビュー操作ロジック
        const pImg = document.getElementById('preview-img');
        function updateTransform() { pImg.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`; }
        pImg.onpointerdown = (ev) => { evCache.push(ev); startX = ev.clientX - pointX; startY = ev.clientY - pointY; };
        pImg.onpointermove = (ev) => {
            for (let i = 0; i < evCache.length; i++) { if (ev.pointerId == evCache[i].pointerId) { evCache[i] = ev; break; } }
            if (evCache.length == 2) {
                isPinching = true;
                let curDiff = Math.abs(evCache[0].clientX - evCache[1].clientX);
                if (prevDiff > 0) { if (curDiff > prevDiff) scale += 0.05; else if (scale > 1) scale -= 0.05; }
                prevDiff = curDiff;
            } else if (evCache.length == 1 && !isPinching) {
                pointX = ev.clientX - startX; pointY = ev.clientY - startY;
            }
            updateTransform();
        };
        pImg.onpointerup = (ev) => { for (let i = 0; i < evCache.length; i++) { if (evCache[i].pointerId == ev.pointerId) { evCache.splice(i, 1); break; } } if (evCache.length < 2) { prevDiff = -1; isPinching = false; } };
    </script>
</body>
</html>
