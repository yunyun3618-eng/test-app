<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>爆速レシートおばちゃん v2.1.2-FIXED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 緑枠位置：少し下げて（15%）カメラ映像と合わせる */
        .scan-area { position: absolute; top: 15%; bottom: 38%; left: 10%; right: 10%; z-index: 20; }
        .corner { position: absolute; width: 30px; height: 30px; border-color: rgba(74, 222, 128, 0.3); border-style: solid; }
        .top-left { top: 0; left: 0; border-width: 6px 0 0 6px; }
        .top-right { top: 0; right: 0; border-width: 6px 6px 0 0; }
        .bottom-left { bottom: 0; left: 0; border-width: 0 0 6px 6px; }
        .bottom-right { bottom: 0; right: 0; border-width: 0 6px 6px 0; }
        .detected .corner { border-color: rgba(74, 222, 128, 1); filter: drop-shadow(0 0 10px rgba(74, 222, 128, 0.8)); }
        
        #preview-overlay, #settings-overlay { position: fixed; inset: 0; z-index: 100; display: none; background: #000; overflow: hidden; }
        #settings-overlay { background: rgba(0,0,0,0.8); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); }
        #preview-container { position: absolute; inset: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #preview-img { max-width: 100%; max-height: 100%; object-fit: contain; transform-origin: 0 0; will-change: transform; touch-action: none; }
        #hud-panel {
            position: absolute; bottom: 20px; left: 15px; right: 15px;
            background: rgba(31, 41, 55, 0.75); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 20px; z-index: 110;
        }
        .history-card { min-width: 65px; width: 65px; height: 85px; background: rgba(55,65,81,0.8); border-radius: 6px; border: 1.5px solid #10b981; overflow: hidden; flex-shrink: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-gray-900 text-white overflow-hidden font-sans text-xs">

    <div id="settings-overlay" class="flex items-center justify-center p-6">
        <div class="w-full max-w-xs bg-gray-800 rounded-3xl p-6 border border-gray-700 space-y-6">
            <h2 class="text-lg font-black text-green-400 text-center">SETTINGS</h2>
            <div class="space-y-4">
                <div class="flex items-center justify-between p-3 bg-black/40 rounded-xl">
                    <div>
                        <p class="font-bold text-sm">爆速モード</p>
                        <p class="text-[9px] text-gray-500">OFFなら1枚ずつ確認するよ</p>
                    </div>
                    <input type="checkbox" id="speed-mode-toggle" checked class="w-10 h-6 rounded-full appearance-none bg-gray-600 checked:bg-green-500 relative transition-all before:content-[''] before:absolute before:w-4 before:h-4 before:bg-white before:rounded-full before:top-1 before:left-1 checked:before:left-5 before:transition-all">
                </div>
            </div>
            <button onclick="toggleSettings()" class="w-full bg-gray-700 py-3 rounded-xl font-bold">設定を閉じる</button>
        </div>
    </div>

    <div id="preview-overlay">
        <div id="preview-container"><img id="preview-img" src="" alt="プレビュー"></div>
        <div id="hud-panel" class="space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <input type="text" id="edit-date" class="w-full bg-black/40 border border-white/10 rounded-lg p-2 text-xs text-white" placeholder="日付">
                <input type="text" id="edit-shop" class="w-full bg-black/40 border border-white/10 rounded-lg p-2 text-xs text-white" placeholder="店名">
            </div>
            <select id="edit-category" class="w-full bg-black/40 border border-white/10 rounded-lg p-3 text-sm text-white"><option>食費</option><option>日用品</option><option>交通費</option><option>交際費</option><option>その他</option></select>
            <div class="relative">
                <span class="absolute left-4 top-2.5 text-blue-400 text-xl font-bold">¥</span>
                <input type="number" id="edit-amount" class="w-full bg-black/40 border border-white/10 rounded-xl py-3 pl-10 text-3xl font-mono text-blue-400 outline-none focus:border-blue-500">
            </div>
            <div class="flex gap-3 pt-2">
                <button onclick="closePreview(false)" class="flex-1 bg-white/10 py-4 rounded-2xl font-bold text-gray-300 active:scale-95 transition-transform text-gray-300">キャンセル</button>
                <button onclick="closePreview(true)" class="flex-1 bg-blue-600/80 py-4 rounded-2xl font-bold active:scale-95 transition-transform text-white">反映して次へ</button>
            </div>
        </div>
    </div>

    <div class="fixed top-0 left-0 right-0 p-4 z-50 flex items-start justify-between bg-gradient-to-b from-black">
        <div class="flex items-start gap-2">
            <div class="text-4xl flex-none">👵</div>
            <div class="flex-1 space-y-2">
                <div id="msg-box" class="bg-white/90backdrop-blur p-2 rounded-lg rounded-tl-none border-2 border-green-500 text-gray-800 font-bold mb-2 minimized transition-all">
                    <p id="msg" class="leading-tight text-[10px]">スキャン中！レシート見せて！</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="toggleMsg()" class="bg-black/60 px-3 py-1 rounded-full border border-white/20 text-[10px]">▼</button>
                    <button id="ctrl-play" onclick="resumeScanner()" class="bg-green-900/60 px-4 py-1 rounded-full border border-green-500/50 text-[10px] shadow-lg">▶ 再生</button>
                    <button id="ctrl-stop" onclick="pauseScanner()" class="bg-red-900/60 px-4 py-1 rounded-full border border-red-500/50 text-[10px] shadow-lg">■ 停止</button>
                </div>
            </div>
        </div>
        <button onclick="toggleSettings()" class="bg-black/60 p-3 rounded-full border border-white/10 text-gray-400 active:scale-90 transition-transform flex-none">
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /></svg>
        </button>
    </div>

    <div id="camera-container" class="w-full h-screen relative bg-black overflow-hidden">
        <div id="placeholder" class="absolute inset-0 flex items-center justify-center text-gray-700 text-[10px] uppercase italic">Initializing...</div>
        <div id="scan-frame" class="scan-area pointer-events-none detected">
            <div class="corner top-left"></div><div class="corner top-right"></div>
            <div class="corner bottom-left"></div><div class="corner bottom-right"></div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 z-[50] bg-gradient-to-t from-black pt-12 pb-8 px-4 flex items-end gap-3">
        <button onclick="alert('一括保存準備中！')" class="flex-none w-14 h-14 rounded-2xl bg-green-600 flex items-center justify-center shadow-lg active:scale-90 transition-transform">
            <svg class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" /></svg>
        </button>
        <div id="history-list" class="flex-1 flex gap-2 overflow-x-auto no-scrollbar min-h-[85px] items-end px-1 italic text-[8px] text-gray-700">NO DATA</div>
    </div>

    <canvas id="proc-canvas" class="hidden"></canvas>

    <script>
        let isProcessing = false;
        let isPaused = true;
        let history = [];
        let currentIndex = -1;
        let videoEl = null;
        let scale = 1, pointX = 0, pointY = 0, startX = 0, startY = 0, evCache = [], prevDiff = -1, isPinching = false;
        const img = document.getElementById('preview-img');

        function toggleSettings() { const s = document.getElementById('settings-overlay'); s.style.display = s.style.display === 'flex' ? 'none' : 'flex'; }
        function toggleMsg() { document.getElementById('msg-box').classList.toggle('minimized'); }
        function pauseScanner() { isPaused = true; document.getElementById('msg').innerText = "一時停止したよ。準備しな。"; }
        async function resumeScanner() { if (!videoEl) await initCamera(); isPaused = false; document.getElementById('msg').innerText = "スキャン再開！見せておくれ！"; }
        
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1280 } } });
                videoEl = document.createElement('video'); videoEl.srcObject = stream; videoEl.setAttribute('playsinline', ''); videoEl.play();
                videoEl.className = "w-full h-full object-cover"; document.getElementById('placeholder').replaceWith(videoEl);
                setInterval(() => detect(videoEl), 200);
            } catch (e) { alert("カメラが必要です。"); }
        }

        function detect(video) {
            if (isProcessing || isPaused || !video.videoWidth) return;
            const canvas = document.getElementById('proc-canvas'); const ctx = canvas.getContext('2d'); canvas.width = 100; canvas.height = 100; ctx.drawImage(video, 0, 0, 100, 100);
            const p = ctx.getImageData(0, 0, 100, 100).data; let w = 0;
            for (let i = 0; i < p.length; i += 4) { if (p[i] > 185 && p[i+1] > 185 && p[i+2] > 185) w++; }
            if (w / 10000 > 0.08) capture(video);
        }

        function capture(video) {
            isProcessing = true; // 撮影ロック
            const c = document.createElement('canvas'); c.width = video.videoWidth; c.height = video.videoHeight; c.getContext('2d').drawImage(video, 0, 0);
            const data = { img: c.toDataURL('image/jpeg', 0.5), amount: "", shop: "", category: "食費", date: new Date().toLocaleDateString() };
            history.unshift(data);
            updateHistoryUI();

            const isSpeedMode = document.getElementById('speed-mode-toggle').checked;
            if (!isSpeedMode) {
                // 通常モード：プレビューを開くが、JS側の判定はロック(isPaused=true)
                openPreview(0);
            } else {
                // 爆速モード：静かな3秒インターバル
                document.getElementById('msg').innerText = `${history.length}枚目撮ったよ。`;
                setTimeout(() => { isProcessing = false; }, 3000);
            }
        }

        function openPreview(i) {
            currentIndex = i; isPaused = true; // カメラ判定停止
            scale = 1; pointX = 0; pointY = 0; updateTransform();
            const it = history[i]; img.src = it.img;
            document.getElementById('edit-date').value = it.date; document.getElementById('edit-shop').value = it.shop;
            document.getElementById('edit-category').value = it.category; document.getElementById('edit-amount').value = it.amount;
            document.getElementById('preview-overlay').style.display = 'block';
        }

        function closePreview(ref) {
            if (ref && currentIndex !== -1) {
                const it = history[currentIndex];
                it.date = document.getElementById('edit-date').value; it.shop = document.getElementById('edit-shop').value;
                it.category = document.getElementById('edit-category').value; it.amount = document.getElementById('edit-amount').value;
                updateHistoryUI();
            }
            document.getElementById('preview-overlay').style.display = 'none';
            
            // 静かなる3秒インターバル。脳みそは使いません。
            document.getElementById('msg').innerText = "スキャン再開。"; 
            setTimeout(() => {
                isProcessing = false; // クールタイム解除
                isPaused = false; // 判定再開
            }, 3000); 
        }

        function updateHistoryUI() {
            const l = document.getElementById('history-list'); l.innerHTML = "";
            history.forEach((d, i) => {
                const card = document.createElement('div'); card.className = "history-card flex-none shadow-lg active:scale-95 transition-transform"; card.onclick = () => openPreview(i);
                card.innerHTML = `<img src="${d.img}" class="w-full h-full object-cover">`; l.appendChild(card);
            });
        }

        function updateTransform() { img.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`; }
        img.onpointerdown = (ev) => { evCache.push(ev); startX = ev.clientX - pointX; startY = ev.clientY - pointY; };
        img.onpointermove = (ev) => {
            for (let i = 0; i < evCache.length; i++) { if (ev.pointerId == evCache[i].pointerId) { evCache[i] = ev; break; } }
            if (evCache.length == 2) {
                isPinching = true;
                let curDiff = Math.abs(evCache[0].clientX - evCache[1].clientX);
                if (prevDiff > 0) { if (curDiff > prevDiff) scale += 0.05; else if (scale > 1) scale -= 0.05; }
                prevDiff = curDiff;
            } else if (evCache.length == 1 && !isPinching) {
                pointX = ev.clientX - startX; pointY = ev.clientY - startY;
            }
            updateTransform();
        };
        img.onpointerup = (ev) => { for (let i = 0; i < evCache.length; i++) { if (evCache[i].pointerId == ev.pointerId) { evCache.splice(i, 1); break; } } if (evCache.length < 2) { prevDiff = -1; isPinching = false; } };
    </script>
</body>
</html>
