<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>爆速レシートおばちゃん（UI改善版）</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 枠の設定：下側(bottom)を25%空けて、操作系と被らないように */
        .scan-area { 
            position: absolute; 
            top: 10%; bottom: 25%; left: 10%; right: 10%;
            z-index: 20;
        }
        /* 四隅のデザイン：borderを透明にし、擬似要素だけでカギ括弧を作る */
        .corner { position: absolute; width: 40px; height: 40px; border-color: rgba(74, 222, 128, 0.3); border-style: solid; transition: border-color 0.2s; }
        .top-left { top: 0; left: 0; border-width: 6px 0 0 6px; }
        .top-right { top: 0; right: 0; border-width: 6px 6px 0 0; }
        .bottom-left { bottom: 0; left: 0; border-width: 0 0 6px 6px; }
        .bottom-right { bottom: 0; right: 0; border-width: 0 6px 6px 0; }

        /* 検知時の色替え */
        .detected .corner { border-color: rgba(74, 222, 128, 1); filter: drop-shadow(0 0 8px rgba(74, 222, 128, 0.8)); }
        
        /* 履歴リストのカスタマイズ */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .history-card { 
            min-width: 70px; width: 70px; height: 90px; 
            background: #374151; border-radius: 6px; border: 2px solid #10b981;
            overflow: hidden; flex-shrink: 0; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3);
        }

        @keyframes flash { 0% { background: white; } 100% { background: transparent; } }
        .flash-active { animation: flash 0.3s ease-out; }
    </style>
</head>
<body class="bg-gray-900 text-white overflow-hidden font-sans">

    <div class="fixed top-0 left-0 right-0 p-4 z-50 bg-gradient-to-b from-black/80 to-transparent flex items-start gap-2">
        <div class="text-4xl">👵</div>
        <div class="bg-white p-2 rounded-lg rounded-tl-none shadow-xl max-w-[240px] text-gray-800">
            <p id="msg" class="text-xs font-bold leading-tight">よし、枠をぐいっと上げたよ！<br>角に合わせる感じで置いてごらん！</p>
        </div>
    </div>

    <div id="camera-container" class="w-full h-screen relative bg-black overflow-hidden">
        <div id="placeholder" class="absolute inset-0 flex items-center justify-center text-[10px] text-gray-600">WAKING UP...</div>
        
        <div id="scan-frame" class="scan-area pointer-events-none">
            <div class="corner top-left"></div>
            <div class="corner top-right"></div>
            <div class="corner bottom-left"></div>
            <div class="corner bottom-right"></div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 z-40 bg-gradient-to-t from-black via-black/80 to-transparent pt-10 pb-6 px-4">
        <div id="history-list" class="flex gap-3 overflow-x-auto no-scrollbar mb-4 min-h-[90px] items-end">
            <div class="text-[8px] text-gray-600 font-bold uppercase py-8">No History</div>
        </div>
        
        <div class="flex justify-between items-end border-t border-gray-800 pt-2">
            <div>
                <div id="status" class="text-[12px] text-green-400 font-black tracking-tighter">PHYSICAL SCAN MODE</div>
                <div id="debug" class="text-[8px] text-gray-500 font-mono italic">Ready...</div>
            </div>
            <div class="text-[8px] text-gray-500 font-bold opacity-30">UI-FIX v1.2</div>
        </div>
    </div>

    <canvas id="proc-canvas" class="hidden"></canvas>

    <script>
        let isProcessing = false;
        let scanCount = 0;

        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 } } 
                });
                const video = document.createElement('video');
                video.srcObject = stream;
                video.setAttribute('playsinline', '');
                video.play();
                video.className = "w-full h-full object-cover";
                document.getElementById('placeholder').replaceWith(video);
                
                // 検知ループ
                setInterval(() => detect(video), 250);
            } catch (e) { document.getElementById('msg').innerText = "カメラ、出しておくれよ。"; }
        }

        function detect(video) {
            if (isProcessing || !video.videoWidth) return;

            const canvas = document.getElementById('proc-canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = 100; canvas.height = 100;
            ctx.drawImage(video, 0, 0, 100, 100);
            
            const pixels = ctx.getImageData(0, 0, 100, 100).data;
            let whiteCount = 0;
            for (let i = 0; i < pixels.length; i += 4) {
                if (pixels[i] > 185 && pixels[i+1] > 185 && pixels[i+2] > 185) whiteCount++;
            }

            const ratio = whiteCount / 10000;
            const frame = document.getElementById('scan-frame');
            document.getElementById('debug').innerText = `WHITE: ${Math.round(ratio * 100)}%`;

            if (ratio > 0.06 && ratio < 0.65) {
                frame.classList.add('detected');
                capture(video);
            } else {
                frame.classList.remove('detected');
            }
        }

        function capture(video) {
            isProcessing = true;
            scanCount++;

            const saveCanvas = document.createElement('canvas');
            saveCanvas.width = video.videoWidth;
            saveCanvas.height = video.videoHeight;
            saveCanvas.getContext('2d').drawImage(video, 0, 0);
            const dataUrl = saveCanvas.toDataURL('image/jpeg', 0.5);

            // フラッシュ
            const container = document.getElementById('camera-container');
            container.classList.add('flash-active');
            setTimeout(() => container.classList.remove('flash-active'), 300);

            // 履歴追加
            const list = document.getElementById('history-list');
            if (scanCount === 1) list.innerHTML = ""; // 初回にメッセージ消去
            
            const card = document.createElement('div');
            card.className = "history-card flex-none animate-bounce-short";
            card.innerHTML = `<img src="${dataUrl}" class="w-full h-full object-cover">`;
            list.prepend(card); // 新しい順に左から

            document.getElementById('msg').innerText = `${scanCount}枚目！次もどんどんおくれ！`;

            // 3秒後に次の検知を許可
            setTimeout(() => { isProcessing = false; }, 3000);
        }

        window.onload = init;
    </script>
</body>
</html>
