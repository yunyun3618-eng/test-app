<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>爆速レシートおばちゃん v2.2.1-UI-FIX</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 【修正1】緑枠（スキャンエリア）をChrome基準で拡大・調整 */
        .scan-area {
            position: absolute;
            top: 15%;    /* メッセージエリアの下から */
            bottom: 30%; /* 履歴エリアの上まで */
            left: 5%;    /* 左右の余白を詰める */
            right: 5%;
            z-index: 20;
            /* 画面サイズに合わせて自動調整されるように */
            max-height: 60vh; 
        }
        .corner { position: absolute; width: 40px; height: 40px; border-color: rgba(74, 222, 128, 0.6); border-style: solid; }
        .top-left { top: 0; left: 0; border-width: 8px 0 0 8px; }
        .top-right { top: 0; right: 0; border-width: 8px 8px 0 0; }
        .bottom-left { bottom: 0; left: 0; border-width: 0 0 8px 8px; }
        .bottom-right { bottom: 0; right: 0; border-width: 0 8px 8px 0; }
        
        #preview-overlay { position: fixed; inset: 0; z-index: 100; display: none; background: #000; }
        #hud-panel { position: absolute; bottom: calc(20px + env(safe-area-inset-bottom)); left: 15px; right: 15px; background: rgba(31, 41, 55, 0.95); border-radius: 24px; padding: 20px; z-index: 110; }
        
        #msg-box { background: rgba(255, 255, 255, 0.98) !important; color: #111 !important; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .minimized { height: 0; padding: 0 !important; overflow: hidden; margin: 0 !important; border: none !important; }

        /* 【修正2】履歴エリア（カードプレビュー）のレイアウト完全修正 */
        #history-list {
            flex: 1;
            display: flex;
            gap: 10px;                  /* カード間の隙間 */
            overflow-x: auto;          /* 横スクロール有効 */
            padding: 5px 10px;
            scroll-behavior: smooth;   /* スムーズスクロール */
            /* iOSの横スクロールの慣性を効かせる */
            -webkit-overflow-scrolling: touch; 
        }
        /* 横スクロールバーを非表示（CSS標準） */
        #history-list { -ms-overflow-style: none; scrollbar-width: none; }
        #history-list::-webkit-scrollbar { display: none; }

        /* 【修正3】履歴カード自体のCSS */
        .history-card {
            width: 70px;    /* 固定幅 */
            height: 90px;   /* 固定高 */
            background: #2d3748; /* 黒すぎないグレー */
            border-radius: 8px;
            border: 2px solid #10b981; /* 緑枠 */
            overflow: hidden;
            flex-shrink: 0; /* 横並びで潰れないように */
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            cursor: pointer;
            transition: transform 0.1s;
        }
        .history-card:active { transform: scale(0.95); } /* タップフィードバック */
        .history-card img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 画像をカード全体にフィットさせる（重要） */
        }
    </style>
</head>
<body class="bg-gray-900 text-white overflow-hidden font-sans text-xs flex flex-col h-screen">

    <div class="fixed top-0 left-0 right-0 p-4 z-50 flex items-start justify-between bg-gradient-to-b from-black/90 to-transparent pointer-events-none">
        <div class="flex items-start gap-2 pointer-events-auto">
            <div class="text-4xl">👵</div>
            <div class="flex flex-col gap-2">
                <div id="msg-box" class="p-2.5 rounded-lg rounded-tl-none border-2 border-green-500 font-bold minimized">
                    <p id="msg" class="leading-tight text-[11px]">爆速モードON！カシャカシャいくよ！</p>
                </div>
                <div class="flex gap-2">
                    <button onclick="toggleMsg()" class="bg-black/70 px-3 py-1 rounded-full border border-white/20 text-[10px]">▼</button>
                    <button onclick="resumeScanner()" class="bg-green-600/80 px-4 py-1 rounded-full text-[10px] font-bold shadow-lg active:scale-95">▶ 再生</button>
                    <button onclick="pauseScanner()" class="bg-red-600/80 px-4 py-1 rounded-full text-[10px] font-bold shadow-lg active:scale-95">■ 停止</button>
                </div>
                <div class="flex bg-black/60 p-1 rounded-full border border-white/20 w-fit">
                    <button id="mode-speed" onclick="setSpeedMode(true)" class="px-4 py-1 rounded-full text-[10px] font-bold bg-green-600 transition-all">爆速</button>
                    <button id="mode-normal" onclick="setSpeedMode(false)" class="px-4 py-1 rounded-full text-[10px] font-bold transition-all">通常</button>
                </div>
            </div>
        </div>
        <button onclick="alert('設定は工事中')" class="bg-black/70 p-3 rounded-full border border-white/20 text-white pointer-events-auto active:scale-90">
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" /></svg>
        </button>
    </div>

    <div id="camera-container" class="flex-1 relative bg-black overflow-hidden h-[70vh]">
        <div id="scan-frame" class="scan-area pointer-events-none">
            <div class="corner top-left"></div><div class="corner top-right"></div>
            <div class="corner bottom-left"></div><div class="corner bottom-right"></div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 z-[50] bg-gradient-to-t from-black via-black/95 to-transparent pb-[calc(10px+env(safe-area-inset-bottom))] pt-8 px-4 flex items-center gap-3 pointer-events-none">
        <button onclick="alert('保存は工事中')" class="flex-none w-16 h-16 rounded-3xl bg-green-600 flex items-center justify-center shadow-lg pointer-events-auto active:scale-95">
            <svg class="h-9 w-9 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" /></svg>
        </button>
        <div id="history-list" class="pointer-events-auto">
            <p class="text-[9px] text-gray-700 italic flex-1 self-center">No scans yet...</p>
        </div>
    </div>

    <div id="preview-overlay">
        <div class="absolute inset-0 flex items-center justify-center p-2">
            <img id="preview-img" src="" class="max-w-full max-h-full object-contain">
        </div>
        <div id="hud-panel" class="space-y-4">
            <div class="grid grid-cols-2 gap-3">
                <input type="text" id="edit-date" class="bg-black/60 border border-white/20 rounded-lg p-2.5 text-xs text-white" placeholder="日付">
                <input type="text" id="edit-shop" class="bg-black/60 border border-white/20 rounded-lg p-2.5 text-xs text-white" placeholder="店名">
            </div>
            <div class="relative">
                <span class="absolute left-4 top-2 text-blue-400 text-xl font-bold">¥</span>
                <input type="number" id="edit-amount" class="w-full bg-black/60 border border-white/20 rounded-xl py-4 pl-12 text-4xl font-mono text-blue-400 outline-none focus:border-blue-500" placeholder="0">
            </div>
            <div class="flex gap-3">
                <button onclick="closePreview(false)" class="flex-1 bg-gray-700 py-4 rounded-2xl font-bold text-gray-300">キャンセル</button>
                <button onclick="closePreview(true)" class="flex-1 bg-blue-600/90 py-4 rounded-2xl font-bold text-white">反映</button>
            </div>
        </div>
    </div>

    <canvas id="proc-canvas" class="hidden"></canvas>

    <script>
        // JSロジックは前回同様（モード切替、カメラ起動、撮影、プレビュー開閉）
        let isProcessing = false, isPaused = true, history = [], currentIndex = -1, videoEl = null, speedMode = true;
        let scale = 1, pointX = 0, pointY = 0, startX = 0, startY = 0, evCache = [], prevDiff = -1, isPinching = false;
        const pImg = document.getElementById('preview-img');

        function setSpeedMode(isSpeed) {
            speedMode = isSpeed;
            document.getElementById('mode-speed').className = isSpeed ? "px-4 py-1 rounded-full text-[10px] font-bold bg-green-600" : "px-4 py-1 rounded-full text-[10px] font-bold transition-all";
            document.getElementById('mode-normal').className = !isSpeed ? "px-4 py-1 rounded-full text-[10px] font-bold bg-blue-600" : "px-4 py-1 rounded-full text-[10px] font-bold transition-all";
            document.getElementById('msg').innerText = isSpeed ? "爆速モードだよ！カシャカシャいくよ！" : "通常モード。1枚ずつ確認だね。";
        }

        function toggleMsg() { document.getElementById('msg-box').classList.toggle('minimized'); }
        function pauseScanner() { isPaused = true; document.getElementById('msg').innerText = "止まったよ。ゆっくり準備しな。"; }
        async function resumeScanner() { if (!videoEl) await initCamera(); isPaused = false; isProcessing = false; document.getElementById('msg').innerText = "スキャン中！レシート見せて！"; }
        
        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1280 } } });
                videoEl = document.createElement('video'); videoEl.srcObject = stream; videoEl.setAttribute('playsinline', ''); videoEl.play();
                videoEl.className = "w-full h-full object-cover"; document.getElementById('camera-container').prepend(videoEl);
                // 枠の検出感度を上げるためにインターバルを短く
                setInterval(() => detect(videoEl), 200);
            } catch (e) { alert("カメラ起動に失敗したよ。設定を確認してね。"); }
        }

        function detect(video) {
            if (isProcessing || isPaused || !video.videoWidth) return;
            const canvas = document.getElementById('proc-canvas'); const ctx = canvas.getContext('2d'); canvas.width = 100; canvas.height = 100; ctx.drawImage(video, 0, 0, 100, 100);
            const p = ctx.getImageData(0, 0, 100, 100).data; let w = 0;
            // 枠の白色判定閾値を少し甘く
            for (let i = 0; i < p.length; i += 4) { if (p[i] > 180 && p[i+1] > 180 && p[i+2] > 180) w++; }
            if (w / 10000 > 0.08) capture(video); // 判定エリアが広くても8%あれば撮影
        }

        function capture(video) {
            isProcessing = true;
            // 音を出す処理は省略（AudioContextは必要に応じて復活）
            const c = document.createElement('canvas'); c.width = video.videoWidth; c.height = video.videoHeight; c.getContext('2d').drawImage(video, 0, 0);
            history.unshift({ img: c.toDataURL('image/jpeg', 0.5), amount: "", shop: "", date: new Date().toLocaleDateString() });
            updateHistoryUI();

            if (!speedMode) {
                openPreview(0);
            } else {
                document.getElementById('msg').innerText = `${history.length}枚目撮ったよ！`;
                // クールタイムを短く
                setTimeout(() => { if(!isPaused) isProcessing = false; }, 2000);
            }
        }

        function updateHistoryUI() {
            const list = document.getElementById('history-list'); list.innerHTML = "";
            if(history.length === 0) { list.innerHTML = `<p class="text-[9px] text-gray-700 italic flex-1 self-center">No scans yet...</p>`; return; }
            history.forEach((data, index) => {
                const card = document.createElement('div');
                card.className = "history-card shadow-lg"; 
                card.onclick = () => openPreview(index);
                // 【修正5】カード内に画像を生成
                card.innerHTML = `<img src="${data.img}" alt="Scan ${index}">`;
                list.appendChild(card);
            });
            // 撮影したら最新のカードが見えるように自動スクロール
            list.scrollLeft = 0;
        }

        function openPreview(index) {
            currentIndex = index; isPaused = true;
            scale = 1; pointX = 0; pointY = 0; updateTransform();
            const it = history[index]; pImg.src = it.img;
            document.getElementById('edit-date').value = it.date; document.getElementById('edit-shop').value = it.shop;
            document.getElementById('edit-amount').value = it.amount;
            document.getElementById('preview-overlay').style.display = 'block';
        }

        function closePreview(reflect) {
            if (reflect && currentIndex !== -1) {
                const it = history[currentIndex];
                it.date = document.getElementById('edit-date').value; it.shop = document.getElementById('edit-shop').value;
                it.amount = document.getElementById('edit-amount').value;
                updateHistoryUI();
            }
            document.getElementById('preview-overlay').style.display = 'none';
            document.getElementById('msg').innerText = "2秒待ってから次撮るよ！";
            setTimeout(() => { isProcessing = false; isPaused = false; document.getElementById('msg').innerText = "スキャン中！"; }, 2000);
        }

        // プレビューズームロジック
        function updateTransform() { pImg.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`; }
        pImg.onpointerdown = (ev) => { evCache.push(ev); startX = ev.clientX - pointX; startY = ev.clientY - pointY; };
        pImg.onpointermove = (ev) => {
            for (let i = 0; i < evCache.length; i++) { if (ev.pointerId == evCache[i].pointerId) { evCache[i] = ev; break; } }
            if (evCache.length == 2) {
                isPinching = true;
                let curDiff = Math.abs(evCache[0].clientX - evCache[1].clientX);
                if (prevDiff > 0) { if (curDiff > prevDiff) scale += 0.05; else if (scale > 1) scale -= 0.05; }
                prevDiff = curDiff;
            } else if (evCache.length == 1 && !isPinching) {
                pointX = ev.clientX - startX; pointY = ev.clientY - startY;
            }
            updateTransform();
        };
        pImg.onpointerup = (ev) => { for (let i = 0; i < evCache.length; i++) { if (evCache[i].pointerId == ev.pointerId) { evCache.splice(i, 1); break; } } if (evCache.length < 2) { prevDiff = -1; isPinching = false; } };
    </script>
</body>
</html>
