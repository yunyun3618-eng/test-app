<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TaxHelper Pro v2.8.4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 44px; height: 44px; z-index: 20; pointer-events: none; }
        .crosshair-line { position: absolute; background-color: #4ade80; box-shadow: 0 0 0 1px rgba(0,0,0,0.8); }
        .crosshair-h { top: 21px; left: 0; width: 44px; height: 2px; }
        .crosshair-v { top: 0; left: 21px; width: 2px; height: 44px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
        .blinking { animation: blink 1.2s infinite; }
        
        /* 演出用: シャッターフラッシュ */
        #shutter-flash { position: absolute; inset: 0; background: white; opacity: 0; pointer-events: none; z-index: 30; transition: opacity 0.1s; }
        .flash-active { opacity: 1 !important; transition: none !important; }

        #preview-overlay { position: fixed; inset: 0; z-index: 100; display: none; background: rgba(0,0,0,0.9); touch-action: none; }
        .preview-viewport { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; padding-bottom: 320px; background: #000; }
        #preview-img { touch-action: none; user-select: none; -webkit-user-drag: none; will-change: transform; transition: transform 0.05s linear; }
        #hud-panel { position: absolute; bottom: 30px; left: 12px; right: 12px; background: rgba(30, 41, 59, 0.85); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); border-radius: 24px; padding: 20px; z-index: 110; }
        #msg-box { background: rgba(255, 255, 255, 0.98); color: #111; box-shadow: 0 4px 15px rgba(0,0,0,0.4); border-left: 4px solid #10b981; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .minimized { height: 0; padding: 0 !important; overflow: hidden; border: none !important; margin: 0 !important; opacity: 0; }
        #history-list { flex: 1; display: flex; gap: 10px; overflow-x: auto; padding: 5px; -webkit-overflow-scrolling: touch; }
        .history-card { width: 70px; height: 90px; background: #2d3748; border-radius: 12px; border: 2px solid #10b981; overflow: hidden; flex-shrink: 0; }
        .history-card img { width: 100%; height: 100%; object-fit: cover; }
        
        .btn-disabled { pointer-events: none !important; opacity: 0.5 !important; filter: grayscale(1); }
    </style>
</head>
<body class="bg-gray-900 text-white overflow-hidden font-sans text-xs flex flex-col h-screen" onload="preInitCamera()">

<div id="ready-screen" class="fixed inset-0 z-[300] bg-black/40 backdrop-blur-sm flex flex-col items-center justify-center p-6 text-center">
    <div id="ready-content">
        <h1 class="text-2xl font-bold text-green-400 mb-2 tracking-widest">RECEIPT SCANNER</h1>
        <p class="text-gray-200 mb-10 text-sm font-bold shadow-black">スキャンを開始します</p>
        <button onclick="startApp(false)" class="bg-green-600 px-16 py-5 rounded-2xl font-bold text-lg shadow-2xl active:scale-95 transition-all w-64">スキャン開始</button>
    </div>
    <div id="recover-panel" class="hidden mt-8 pt-8 border-t border-white/20 w-64">
        <p class="text-blue-400 mb-4 font-bold">中断したデータがあります</p>
        <button onclick="startApp(true)" class="bg-blue-600 px-8 py-4 rounded-2xl font-bold text-md shadow-2xl active:scale-95 transition-all w-full animate-pulse">前回の続きから再開</button>
    </div>
</div>

<div id="preview-overlay">
    <div class="preview-viewport"><img id="preview-img" src="" class="max-w-full max-h-full object-contain"></div>
    <div id="hud-panel" class="space-y-4 max-w-md mx-auto">
        <div class="grid grid-cols-2 gap-3">
            <input type="text" id="edit-date" class="bg-white/10 border border-white/20 rounded-lg p-3 text-white">
            <input type="text" id="edit-shop" class="bg-white/10 border border-white/20 rounded-lg p-3 text-white" placeholder="店名">
        </div>
        <div id="edit-items-area" class="space-y-2 max-h-32 overflow-y-auto bg-black/20 p-2 rounded-lg"></div>
        <div class="relative">
            <span class="absolute left-4 top-3 text-blue-400 text-2xl font-bold">¥</span>
            <input type="number" id="edit-amount" class="w-full bg-black/40 border border-white/20 rounded-xl py-4 pl-12 text-4xl font-mono text-blue-400 outline-none">
        </div>
        <div class="flex gap-4">
            <button onclick="closePreview(false)" class="flex-1 bg-gray-600/50 py-4 rounded-xl font-bold">破棄</button>
            <button onclick="closePreview(true)" class="flex-1 bg-blue-600/80 py-4 rounded-xl font-bold">反映して次へ</button>
        </div>
    </div>
</div>

<div class="fixed top-0 left-0 right-0 p-4 z-50 flex items-start justify-between pointer-events-none">
    <div class="flex flex-col gap-2 pointer-events-auto">
        <div id="msg-box" class="p-3 rounded-lg font-bold transition-all"><p id="msg" class="leading-tight text-[11px]">準備中...</p></div>
        <div class="flex gap-2">
            <button onclick="toggleMsg()" class="bg-black/60 p-2.5 rounded-full border border-white/20">▼</button>
            <div id="main-controls" class="flex gap-2">
                <button onclick="resumeScanner()" class="bg-green-600/90 px-5 py-1.5 rounded-full text-[10px] font-bold">▶ 再生</button>
                <button onclick="pauseScanner()" class="bg-red-600/90 px-5 py-1.5 rounded-full text-[10px] font-bold">■ 停止</button>
            </div>
        </div>
        <div class="flex bg-black/60 p-1 rounded-full border border-white/20 w-fit">
            <button id="mode-speed" onclick="setSpeedMode(true)" class="px-4 py-1 rounded-full text-[9px] font-bold">連続スキャン</button>
            <button id="mode-normal" onclick="setSpeedMode(false)" class="px-4 py-1 rounded-full text-[9px] font-bold bg-blue-600">単体スキャン</button>
        </div>
    </div>
    <button class="bg-black/60 p-3 rounded-full border border-white/20 text-xl pointer-events-auto">⚙</button>
</div>

<div id="camera-container" class="flex-1 relative bg-black">
    <div id="shutter-flash"></div>
    <div id="crosshair" class="crosshair"><div class="crosshair-line crosshair-h"></div><div class="crosshair-line crosshair-v"></div></div>
</div>

<div class="fixed bottom-0 left-0 right-0 z-[50] bg-gradient-to-t from-black pt-16 pb-8 px-4 flex items-end gap-3 pointer-events-none">
    <button class="flex-none w-16 h-16 rounded-2xl bg-green-600 flex items-center justify-center pointer-events-auto active:scale-90 text-2xl btn-disabled" onclick="finalSave()">💾</button>
    <div id="history-list" class="pointer-events-auto"></div>
</div>

<canvas id="proc-canvas" class="hidden"></canvas>

<script>
let isProcessing = false;
let isPaused = true;
let historyData = [];
let currentIndex = -1;
let videoEl = null;
let speedMode = false;
let audioCtx;
let stabilityCounter = 0;
const STABILITY_THRESHOLD = 5;

let scale = 1, lastScale = 1, startDist = 0, posX = 0, posY = 0, startX = 0, startY = 0;

// 中断・バックアップ処理
window.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'hidden') {
        if (historyData.length > 0) {
            localStorage.setItem('taxhelper_backup', JSON.stringify(historyData));
            sessionStorage.setItem('is_interrupted', 'true');
        }
        pauseScanner(); 
    }
});

async function preInitCamera() {
    try {
        const backup = localStorage.getItem('taxhelper_backup');
        const interrupted = sessionStorage.getItem('is_interrupted');
        if (backup && interrupted) document.getElementById('recover-panel').classList.remove('hidden');

        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: { ideal: 1280 } } });
        videoEl = document.createElement('video'); videoEl.srcObject = s; videoEl.setAttribute('playsinline', ''); videoEl.play();
        videoEl.className = "w-full h-full object-cover"; document.getElementById('camera-container').prepend(videoEl);
        setInterval(() => { if(!isPaused && videoEl.readyState === 4) detect(videoEl); }, 250);
    } catch (e) { console.error("Camera failed", e); }
}

async function startApp(useRecover) {
    if (useRecover) {
        const backup = localStorage.getItem('taxhelper_backup');
        if (backup) { historyData = JSON.parse(backup); updateHistoryUI(); }
    }
    localStorage.removeItem('taxhelper_backup');
    sessionStorage.removeItem('is_interrupted');

    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    document.getElementById('ready-screen').style.display = 'none';
    resumeScanner();
    initZoomEvents();
}

function setSpeedMode(s) {
    speedMode = s;
    document.getElementById('mode-speed').className = s ? "px-4 py-1 rounded-full text-[9px] font-bold bg-green-600" : "px-4 py-1 rounded-full text-[9px] font-bold";
    document.getElementById('mode-normal').className = !s ? "px-4 py-1 rounded-full text-[9px] font-bold bg-blue-600" : "px-4 py-1 rounded-full text-[9px] font-bold";
}

function updateAIChat(text) { document.getElementById('msg').innerText = text; }

function pauseScanner() { 
    isPaused = true;
    document.getElementById('crosshair').classList.remove('blinking'); 
    updateAIChat("一時停止中（再開するには▶を押してね）");
}

function resumeScanner() { 
    isPaused = false;
    updateAIChat("スキャン待機中...");
    document.getElementById('crosshair').classList.add('blinking'); 
}

function detect(v) {
    if (isPaused) return;

    // --- 2.7.7 ロジックコメント ---
    // 軽量スキャンのためのキャンバス処理
    const c = document.getElementById('proc-canvas'); 
    const ctx = c.getContext('2d'); ctx.drawImage(v, 0, 0, 100, 100);
    const p = ctx.getImageData(0, 0, 100, 100).data; 
    let white = 0;
    // 白色ピクセルの比率でレシートを検知
    for (let i = 0; i < p.length; i += 4) { if (p[i] > 185 && p[i+1] > 185 && p[i+2] > 185) white++; }
    const ratio = white / 10000;
    
    if (isProcessing) {
        if (ratio < 0.08) {
            isProcessing = false;
            updateAIChat("スキャン待機中...");
        } else {
            updateAIChat("次のレシートに変えてね");
        }
        return; 
    }

    if (ratio > 0.15 && ratio < 0.50) {
        stabilityCounter++;
        if (stabilityCounter === 1) updateAIChat("そのまま止めて...");
        if (stabilityCounter >= STABILITY_THRESHOLD) {
            stabilityCounter = 0;
            triggerCapture(v);
        }
    } else {
        stabilityCounter = 0;
    }
}

// 物理的な撮影動作（音・光・振動）とデータ保存を統合（v2.8.2〜）
function triggerCapture(v) {
    // 音演出
    if(audioCtx && !isPaused) {
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.type = 'sine'; o.frequency.setValueAtTime(880, audioCtx.currentTime);
        g.gain.setValueAtTime(0.1, audioCtx.currentTime); g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.1);
    }
    // バイブレーション演出
    if (navigator.vibrate) navigator.vibrate(10);
    // 視覚演出（フラッシュ）
    const flash = document.getElementById('shutter-flash');
    flash.classList.add('flash-active');
    setTimeout(() => flash.classList.remove('flash-active'), 50);

    // キャプチャ処理
    const c = document.createElement('canvas'); c.width = v.videoWidth; c.height = v.videoHeight;
    c.getContext('2d').drawImage(v, 0, 0);
    // スキャンしたデータのカード化処理（unshiftで先頭に追加）
    historyData.unshift({ img: c.toDataURL('image/jpeg', 0.6), amount: "", shop: "", items: [], date: new Date().toLocaleDateString() });
    updateHistoryUI();
    isProcessing = true; 

    if (!speedMode) openPreview(0);
    else updateAIChat("バッチリ！レシートを退けてね");
}

// プレビュー画面の展開とデータ流し込み
function openPreview(i) {
    currentIndex = i;
    pauseScanner(); 
    
    // ズームと位置を初期状態にリセット
    scale = 1; posX = 0; posY = 0; updateTransform();
    
    const it = historyData[i]; 
    document.getElementById('preview-img').src = it.img;
    document.getElementById('edit-date').value = it.date; 
    document.getElementById('edit-shop').value = it.shop;
    document.getElementById('edit-amount').value = it.amount;
    document.getElementById('edit-items-area').innerHTML = "<p class='text-gray-400 text-center italic'>項目未解析</p>";
    document.getElementById('preview-overlay').style.display = 'block';
}

function closePreview(save) {
    if (currentIndex !== -1) {
        if (save) {
            const it = historyData[currentIndex];
            it.date = document.getElementById('edit-date').value; 
            it.shop = document.getElementById('edit-shop').value;
            it.amount = document.getElementById('edit-amount').value;
        } else historyData.splice(currentIndex, 1);
        updateHistoryUI();
    }
    document.getElementById('preview-overlay').style.display = 'none';
    currentIndex = -1;
    isProcessing = true; 
    resumeScanner();
}

function updateTransform() { document.getElementById('preview-img').style.transform = `translate(${posX}px, ${posY}px) scale(${scale})`; }

function initZoomEvents() {
    const overlay = document.getElementById('preview-overlay');
    overlay.addEventListener('touchstart', (e) => {
        if (e.touches.length === 2) {
            startDist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            lastScale = scale;
        } else if (e.touches.length === 1) {
            startX = e.touches[0].pageX - posX; startY = e.touches[0].pageY - posY;
        }
    }, {passive: false});
    overlay.addEventListener('touchmove', (e) => {
        e.preventDefault(); 
        if (e.touches.length === 2) {
            const dist = Math.hypot(e.touches[0].pageX - e.touches[1].pageX, e.touches[0].pageY - e.touches[1].pageY);
            scale = Math.min(Math.max(1, lastScale * (dist / startDist)), 4);
        } else if (e.touches.length === 1) {
            posX = e.touches[0].pageX - startX; posY = e.touches[0].pageY - startY;
        }
        updateTransform();
    }, {passive: false});
}

// 履歴トレイのUI更新処理（カード化）
function updateHistoryUI() {
    const l = document.getElementById('history-list'); l.innerHTML = "";
    historyData.forEach((d, i) => {
        // カード作成とタップイベント付与
        const card = document.createElement('div'); card.className = "history-card"; card.onclick = () => openPreview(i);
        card.innerHTML = `<img src="${d.img}">`; l.appendChild(card);
    });
}

// 将来の保存用メモ:
// クラウドへの送信成功レスポンスを受け取ったら、以下のクリーンアップを実行すること。
// 1. localStorage.removeItem('taxhelper_backup');
// 2. historyData = [];
// 3. updateHistoryUI();
// 4. アプリ状態を完全初期化して二重保存を防止。
function finalSave() { console.log("Future Cloud Save and Cleanup logic here."); }

function toggleMsg() { document.getElementById('msg-box').classList.toggle('minimized'); }
</script>
</body>
</html>
